<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyLens</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #0f172a; color: #e2e8f0; }
        h1 { color: #38bdf8; }
        #query { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; font-size: 16px; background: #1e293b; color: #e2e8f0; box-sizing: border-box; }
        #query:focus { outline: none; border-color: #38bdf8; }
        button { padding: 12px 24px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 8px; }
        button:hover { background: #0369a1; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #results { margin-top: 24px; }
        .answer { background: #1e293b; padding: 16px; border-radius: 8px; margin-bottom: 16px; line-height: 1.6; border-left: 3px solid #38bdf8; }
        .source { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
        .source-header { color: #94a3b8; font-size: 13px; margin-bottom: 8px; }
        .source-header .score { color: #38bdf8; font-weight: bold; }
        pre { background: #0f172a; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 13px; line-height: 1.4; }
        code { color: #a5f3fc; }
        .loading { color: #94a3b8; font-style: italic; }
        .meta { color: #64748b; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>LegacyLens</h1>
    <p style="color: #94a3b8;">Ask questions about the BLAS (Basic Linear Algebra Subprograms) Fortran codebase</p>
    <input type="text" id="query" placeholder="e.g. What does DGEMM do?" autofocus />
    <button onclick="search()" id="btn">Search</button>
    <div id="results"></div>

    <script>
        const input = document.getElementById('query');
        const btn = document.getElementById('btn');
        const results = document.getElementById('results');

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });

        async function search() {
            const query = input.value.trim();
            if (!query) return;
            btn.disabled = true;
            results.innerHTML = '<p class="loading">Searching...</p>';

            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();

                let html = '';
                if (data.answer) {
                    html += `<div class="answer">${formatAnswer(data.answer)}</div>`;
                }
                html += `<p class="meta">Query time: ${data.query_time_ms.toFixed(0)}ms | ${data.sources.length} sources</p>`;
                data.sources.forEach(s => {
                    html += `<div class="source">
                        <div class="source-header">
                            <span class="score">${(s.score * 100).toFixed(1)}%</span>
                            &mdash; ${s.chunk.metadata.file_path}:${s.chunk.metadata.start_line}-${s.chunk.metadata.end_line}
                            ${s.chunk.metadata.subroutine_name ? ` | ${s.chunk.metadata.subroutine_name}` : ''}
                        </div>
                        <pre><code>${escapeHtml(s.chunk.text.substring(0, 1500))}</code></pre>
                    </div>`;
                });
                results.innerHTML = html;
            } catch (err) {
                results.innerHTML = `<p style="color: #f87171;">Error: ${err.message}</p>`;
            }
            btn.disabled = false;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatAnswer(text) {
            return text
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
