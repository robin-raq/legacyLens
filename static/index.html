<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyLens — BLAS Code Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <style>
        /* === CSS Variables === */
        :root {
            --bg-primary: #0b1120;
            --bg-secondary: #131c31;
            --bg-card: #172033;
            --bg-code: #0d1526;
            --border: #1e2d4a;
            --border-hover: #2a3f6a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #0ea5e9;
            --accent-hover: #0284c7;
            --accent-glow: rgba(14, 165, 233, 0.15);
            --accent-subtle: rgba(14, 165, 233, 0.08);
            --success: #34d399;
            --warning: #fbbf24;
            --error: #f87171;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
            --font-ui: 'Outfit', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --transition: 0.2s ease;
        }

        /* === Reset & Base === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-ui);
            font-size: 14px;
            line-height: 1.6;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* === Layout === */
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: clamp(16px, 4vw, 40px);
        }

        /* === Hero === */
        .hero {
            text-align: center;
            padding: clamp(32px, 6vw, 64px) 0 clamp(24px, 4vw, 48px);
        }

        .hero-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: var(--accent-glow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            font-size: 28px;
        }

        .hero h1 {
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .hero h1 span {
            background: linear-gradient(135deg, var(--accent), #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: clamp(14px, 2vw, 16px);
            max-width: 520px;
            margin: 0 auto;
        }

        /* === Search Area === */
        .search-area {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: clamp(16px, 3vw, 24px);
            box-shadow: var(--shadow-md);
            margin-bottom: 32px;
            transition: border-color var(--transition);
        }

        .search-area:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-md), 0 0 0 3px var(--accent-glow);
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        #query {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-ui);
            font-size: 15px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color var(--transition);
            outline: none;
        }

        #query::placeholder { color: var(--text-muted); }
        #query:focus { border-color: var(--accent); }

        #btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background var(--transition), transform var(--transition);
        }

        #btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        #btn:active { transform: translateY(0); }
        #btn:disabled { background: #334155; cursor: not-allowed; transform: none; }

        .search-hints {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .hint:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-subtle);
        }

        /* === Loading === */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 48px 0;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, var(--bg-card), var(--bg-secondary), var(--bg-card));
            background-size: 200% 100%;
            animation: shimmer 1.5s ease infinite;
            border-radius: var(--radius-md);
            height: 120px;
            margin-bottom: 12px;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* === Results === */
        #results { min-height: 40px; }

        /* === Meta Bar === */
        .meta-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .badge-accent { color: var(--accent); border-color: rgba(14, 165, 233, 0.3); background: var(--accent-subtle); }
        .badge-muted { color: var(--text-muted); }

        /* === Answer === */
        .answer {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: var(--radius-md);
            padding: clamp(16px, 3vw, 24px);
            margin-bottom: 24px;
            line-height: 1.7;
            box-shadow: var(--shadow-sm);
            animation: fadeSlideIn 0.3s ease;
        }

        .answer h2, .answer h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 16px 0 8px;
            color: var(--text-primary);
        }

        .answer strong { color: #f1f5f9; }
        .answer code {
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--bg-code);
            padding: 2px 6px;
            border-radius: 4px;
            color: #67e8f9;
        }

        .answer pre {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .answer pre code {
            background: none;
            padding: 0;
            color: #a5f3fc;
        }

        .answer ul, .answer ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .answer li { margin-bottom: 4px; }

        /* === Source Cards === */
        .sources-header {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .source {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color var(--transition), box-shadow var(--transition);
            animation: fadeSlideIn 0.3s ease backwards;
        }

        .source:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .source-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .source-file {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .source-file .icon { color: var(--accent); font-size: 14px; }

        .source-lines {
            font-size: 12px;
            color: var(--text-muted);
        }

        .source-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-subtle);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .score-badge {
            margin-left: auto;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .score-high { color: var(--success); background: rgba(52, 211, 153, 0.1); }
        .score-mid { color: var(--accent); background: var(--accent-subtle); }
        .score-low { color: var(--warning); background: rgba(251, 191, 36, 0.1); }

        .source-code {
            position: relative;
            max-height: 240px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .source-code.expanded { max-height: none; }

        .source-code pre {
            background: var(--bg-code);
            margin: 0;
            padding: 14px 16px;
            font-family: var(--font-mono);
            font-size: 12.5px;
            line-height: 1.5;
            overflow-x: auto;
            border-radius: 0;
            color: #c9d1d9;
        }

        .source-code pre code { color: inherit; background: none; padding: 0; }

        .code-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, var(--bg-code));
            pointer-events: none;
        }

        .source-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .action-btn {
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .action-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-subtle); }

        /* === Empty State === */
        .empty-state {
            text-align: center;
            padding: 64px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state p { font-size: 14px; }

        /* === Error === */
        .error-msg {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.25);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            color: var(--error);
            font-size: 14px;
        }

        /* === Animations === */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === Fortran Syntax Highlights (manual) === */
        .kw { color: #c084fc; }  /* keywords */
        .ty { color: #f472b6; }  /* types */
        .cm { color: #64748b; }  /* comments */
        .st { color: #34d399; }  /* strings */
        .nb { color: #fbbf24; }  /* numbers */
        .fn { color: #38bdf8; }  /* function names */

        /* === Responsive === */
        @media (max-width: 640px) {
            .search-row { flex-direction: column; }
            #btn { width: 100%; justify-content: center; }
            .source-header { gap: 6px; }
            .score-badge { margin-left: 0; }
            .meta-bar { flex-wrap: wrap; gap: 8px; }
        }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* === Focus === */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <header class="hero">
            <div class="hero-icon">🔍</div>
            <h1>Legacy<span>Lens</span></h1>
            <p>AI-powered search and code understanding for the BLAS Fortran codebase. Ask questions in natural language.</p>
        </header>

        <!-- Search -->
        <div class="search-area">
            <div class="search-row">
                <input
                    type="text"
                    id="query"
                    placeholder="Ask about BLAS subroutines, operations, or patterns..."
                    autofocus
                    aria-label="Search the BLAS codebase"
                />
                <button id="btn" aria-label="Search">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Search
                </button>
            </div>
            <div class="search-hints">
                <span class="hint" onclick="fillQuery('What does DGEMM do?')">What does DGEMM do?</span>
                <span class="hint" onclick="fillQuery('Find all Level 1 BLAS operations')">Level 1 operations</span>
                <span class="hint" onclick="fillQuery('How does matrix-vector multiplication work?')">Matrix-vector multiply</span>
                <span class="hint" onclick="fillQuery('Show me error handling patterns')">Error handling</span>
            </div>
        </div>

        <!-- Results -->
        <div id="results">
            <div class="empty-state">
                <div class="icon">📜</div>
                <p>Search 169 BLAS subroutines across the Fortran codebase</p>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('query');
        const btn = document.getElementById('btn');
        const results = document.getElementById('results');

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });

        function fillQuery(text) {
            input.value = text;
            input.focus();
            search();
        }

        async function search() {
            const query = input.value.trim();
            if (!query) return;
            btn.disabled = true;

            results.innerHTML = `
                <div class="loading-container">
                    <div class="spinner"></div>
                    <div class="loading-text">Searching BLAS codebase...</div>
                </div>
                <div class="loading-shimmer"></div>
                <div class="loading-shimmer" style="height:80px;animation-delay:0.2s"></div>
            `;

            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!res.ok) throw new Error(`Server error (${res.status})`);
                const data = await res.json();

                let html = '';

                // Meta bar
                html += `<div class="meta-bar">
                    <span class="badge badge-accent">
                        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        ${data.query_time_ms.toFixed(0)}ms
                    </span>
                    <span class="badge badge-muted">${data.sources.length} source${data.sources.length !== 1 ? 's' : ''} found</span>
                </div>`;

                // Answer
                if (data.answer) {
                    html += `<div class="answer">${formatAnswer(data.answer)}</div>`;
                }

                // Sources
                if (data.sources.length > 0) {
                    html += `<div class="sources-header">Source Code</div>`;
                    data.sources.forEach((s, i) => {
                        const m = s.chunk.metadata;
                        const pct = (s.score * 100);
                        const scoreClass = pct >= 45 ? 'score-high' : pct >= 35 ? 'score-mid' : 'score-low';
                        const codeText = s.chunk.text;
                        const isLong = codeText.length > 800;
                        const id = `source-${i}`;

                        html += `<div class="source" style="animation-delay:${i * 0.07}s">
                            <div class="source-header">
                                <span class="source-file">
                                    <span class="icon">📄</span>
                                    ${esc(m.file_path)}
                                </span>
                                <span class="source-lines">L${m.start_line}–${m.end_line}</span>
                                ${m.subroutine_name ? `<span class="source-name">${esc(m.subroutine_name)}</span>` : ''}
                                ${m.blas_level !== 'unknown' ? `<span class="badge badge-muted">Level ${esc(m.blas_level)}</span>` : ''}
                                <span class="score-badge ${scoreClass}">${pct.toFixed(1)}%</span>
                            </div>
                            <div class="source-code ${isLong ? '' : 'expanded'}" id="${id}">
                                <pre><code>${highlightFortran(esc(codeText))}</code></pre>
                                ${isLong ? '<div class="code-fade"></div>' : ''}
                            </div>
                            <div class="source-actions">
                                ${isLong ? `<button class="action-btn" onclick="toggleExpand('${id}', this)">Show more</button>` : ''}
                                <button class="action-btn" onclick="copyCode(this, ${JSON.stringify(codeText).replace(/'/g, '\\\'')})">Copy</button>
                            </div>
                        </div>`;
                    });
                } else {
                    html += `<div class="empty-state">
                        <div class="icon">🔎</div>
                        <p>No relevant results found. Try rephrasing your query.</p>
                    </div>`;
                }

                results.innerHTML = html;
            } catch (err) {
                results.innerHTML = `<div class="error-msg">
                    <span>⚠️</span>
                    <span>Error: ${esc(err.message)}</span>
                </div>`;
            }
            btn.disabled = false;
        }

        function toggleExpand(id, button) {
            const el = document.getElementById(id);
            const expanded = el.classList.toggle('expanded');
            const fade = el.querySelector('.code-fade');
            if (fade) fade.style.display = expanded ? 'none' : '';
            button.textContent = expanded ? 'Show less' : 'Show more';
        }

        function copyCode(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = button.textContent;
                button.textContent = 'Copied!';
                button.style.color = 'var(--success)';
                button.style.borderColor = 'var(--success)';
                setTimeout(() => {
                    button.textContent = orig;
                    button.style.color = '';
                    button.style.borderColor = '';
                }, 1500);
            });
        }

        function esc(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatAnswer(text) {
            return text
                .replace(/###\s+(.+)/g, '<h3>$1</h3>')
                .replace(/##\s+(.+)/g, '<h2>$1</h2>')
                .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
                    `<pre><code>${highlightFortran(esc(code))}</code></pre>`)
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/^\s*[-*]\s+(.+)/gm, '<li>$1</li>')
                .replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>')
                .replace(/\n{2,}/g, '<br><br>')
                .replace(/\n/g, '<br>');
        }

        function highlightFortran(code) {
            return code
                // Comments (lines starting with C, c, *, or !)
                .replace(/^([Cc*!].*)$/gm, '<span class="cm">$1</span>')
                // Inline comments
                .replace(/(![^'"\n]*)$/gm, '<span class="cm">$1</span>')
                // Strings
                .replace(/'([^']*)'/g, '<span class="st">\'$1\'</span>')
                // Types
                .replace(/\b(DOUBLE\s+PRECISION|REAL|INTEGER|COMPLEX|LOGICAL|CHARACTER|IMPLICIT\s+NONE)\b/gi, '<span class="ty">$1</span>')
                // Keywords
                .replace(/\b(SUBROUTINE|FUNCTION|END|IF|THEN|ELSE|DO|CONTINUE|RETURN|CALL|PARAMETER|EXTERNAL|INTRINSIC|GOTO|PROGRAM|MODULE|USE|DATA)\b/g, '<span class="kw">$1</span>')
                // Numbers
                .replace(/\b(\d+\.?\d*(?:[DdEe][+-]?\d+)?)\b/g, '<span class="nb">$1</span>');
        }
    </script>
</body>
</html>
